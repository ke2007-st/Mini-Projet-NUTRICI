<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NutriCI — Admin produits</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>NutriCI Admin</h1>
    <p>Gestion produits / stocks (US3 — binôme)</p>
    <nav>
      <a href="index.html">Boutique</a>
      <a href="admin-produits.html">Admin produits</a>
      <a href="admin-livraison.html">Admin livraison</a>
    </nav>
  </header>
  <main>
    <section>
      <h2>Ajouter un produit</h2>
      <label>Reference <input id="reference" maxlength="6" placeholder="COL007"></label>
      <label>Nom <input id="nom" placeholder="Collagene Marin"></label>
      <label>Prix <input id="prix" type="number" value="14500"></label>
      <label>Stock <input id="stock" type="number" value="15"></label>
      <label>Categorie <select id="categorie"></select></label>
      <button id="btn-ajouter">Ajouter</button>
      <p id="msg" class="message"></p>
    </section>
    <section>
      <h2>Catalogue</h2>
      <div id="liste"></div>
    </section>
  </main>
  <script>
    async function loadCategories() {
      const res = await fetch('/api/categories');
      const json = await res.json();
      const sel = document.getElementById('categorie');
      sel.innerHTML = (json.data || []).map(c => `<option value="${c.id}">${c.nom}</option>`).join('');
    }
    async function loadProduits() {
      const res = await fetch('/api/produits');
      const json = await res.json();
      const root = document.getElementById('liste');
      root.innerHTML = '';
      (json.data || []).forEach(p => {
        const row = document.createElement('div');
        row.className = 'produit';
        row.innerHTML = `<div><strong>${p.nom}</strong><br><small>${p.reference} — stock ${p.qte_stock} — ${p.prix_unitaire} FCFA</small></div>
          <button data-ref="${p.reference}">Supprimer</button>`;
        row.querySelector('button').onclick = async () => {
          const r = await fetch('/api/produits/' + p.reference, { method: 'DELETE' });
          const d = await r.json();
          document.getElementById('msg').textContent = d.message || '';
          loadProduits();
        };
        root.appendChild(row);
      });
    }
    document.getElementById('btn-ajouter').onclick = async () => {
      const body = {
        reference: document.getElementById('reference').value,
        nom: document.getElementById('nom').value,
        prix_unitaire: Number(document.getElementById('prix').value),
        qte_stock: Number(document.getElementById('stock').value),
        categorie_id: Number(document.getElementById('categorie').value)
      };
      const res = await fetch('/api/produits', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      const msg = document.getElementById('msg');
      msg.className = data.success ? 'message' : 'message erreur';
      msg.textContent = data.success ? ('Produit ajoute : ' + data.data.reference) : data.message;
      if (data.success) loadProduits();
    };
    loadCategories(); loadProduits();
  </script>
</body>
</html>
