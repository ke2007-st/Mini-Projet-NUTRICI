<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NutriCI — Boutique</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>NutriCI</h1>
    <p>Catalogue, panier & paiement Mobile Money</p>
    <nav>
      <a href="index.html">Boutique</a>
      <a href="admin-produits.html">Admin produits</a>
      <a href="admin-livraison.html">Admin livraison</a>
    </nav>
  </header>
  <main>
    <section>
      <h2>Produits</h2>
      <label>Categorie
        <select id="filtre-categorie"><option value="">Toutes</option></select>
      </label>
      <div id="catalogue"></div>
    </section>
    <section>
      <h2>Mon panier</h2>
      <div id="panier"></div>
      <p class="total">Total : <strong id="total">0</strong> FCFA</p>
      <label>Email client <input id="email" type="email" value="client@nutrici.ci"></label>
      <label>Operateur
        <select id="operateur">
          <option>Wave</option>
          <option>Orange Money</option>
        </select>
      </label>
      <button id="btn-payer">Payer par Mobile Money</button>
      <p id="message" class="message"></p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
